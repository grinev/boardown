<!-- Master brand mark for boardown. Single source of truth for every shell's
     app icon: scripts/generate-icons.mjs rasterizes this into the PNG / ICO /
     ICNS each build needs. Edit this file and re-run `pnpm icons` to propagate
     it everywhere.

     A board frame holding two cards, offset so they also read as a boar's
     snout (boardown = boar + board). Palette: dark-brown frame/cards on a
     soft amber board. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="224" fill="#63301A"/>
  <!-- board inside the dark frame -->
  <rect x="128" y="128" width="768" height="768" rx="150" fill="#D88C4A"/>
  <!-- two cards, equal spacing, offset like nostrils -->
  <rect x="240" y="362" width="216" height="216" rx="48" fill="#63301A"/>
  <rect x="568" y="446" width="216" height="216" rx="48" fill="#63301A"/>
</svg>
