name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Decide whether this push is a releasable version bump before spending any
  # build minutes. Runs on the runner's preinstalled Node + git only — setting
  # up pnpm + Node (with `cache: pnpm`) here would make the setup-node post-job
  # fail trying to save a pnpm store that the skipped install never created,
  # reddening every non-release push to main.
  determine:
    name: Determine release state
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_release: ${{ steps.determine.outputs.should_release }}
      current_version: ${{ steps.determine.outputs.current_version }}
      is_prerelease: ${{ steps.determine.outputs.is_prerelease }}
      release_kind: ${{ steps.determine.outputs.release_kind }}
      tag_name: ${{ steps.determine.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release state
        id: determine
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          STABLE_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+$'
          RC_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'

          if [[ "$CURRENT_VERSION" =~ $STABLE_PATTERN ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_kind=stable" >> "$GITHUB_OUTPUT"
          elif [[ "$CURRENT_VERSION" =~ $RC_PATTERN ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_kind=rc" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported version format: $CURRENT_VERSION"
            echo "Allowed formats: X.Y.Z and X.Y.Z-rc.N"
            exit 1
          fi

          git fetch --tags --force
          TAG_NAME="v$CURRENT_VERSION"
          if git tag -l "$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag already exists: $TAG_NAME"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Release candidate detected: tag is missing for current version"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: No release needed
        if: steps.determine.outputs.should_release != 'true'
        run: 'echo "Skipping publish: no eligible version bump detected"'

  # Build every distributable artifact. electron-builder packages only for the
  # host OS, so the desktop installers need one runner per OS; the gates and the
  # OS-agnostic .vsix run once on the Linux leg. Each leg uploads its artifacts
  # for the release job to gather. Tagging happens later, only after all of
  # these succeed.
  build:
    name: Build artifacts (${{ matrix.os }})
    needs: determine
    if: needs.determine.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dist-ubuntu
            run_gates: true
          - os: windows-latest
            artifact: dist-windows
          - os: macos-latest
            artifact: dist-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gates + the .vsix are platform-agnostic — run them once, on Linux.
      - name: Lint
        if: matrix.run_gates
        run: pnpm lint

      - name: Typecheck
        if: matrix.run_gates
        run: pnpm typecheck

      - name: Test
        if: matrix.run_gates
        run: pnpm test

      - name: Build VS Code extension (.vsix)
        if: matrix.run_gates
        run: pnpm --filter ./packages/vscode package

      # electron-builder reads its targets from electron-builder.yml and packages
      # for the host OS. macOS is unsigned for now (no Developer ID); disabling
      # the auto-update identity probe keeps the unsigned build from failing.
      - name: Build desktop installers
        env:
          CSC_IDENTITY_AUTOUPDATE: false
        run: pnpm --filter @boardown/electron dist

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          # Glob explicit extensions so electron-builder's intermediate output
          # (*.blockmap, latest*.yml, builder-debug.yml, unpacked dirs) stays out.
          path: |
            packages/vscode/build/*.vsix
            packages/electron/release/*.exe
            packages/electron/release/*.dmg
            packages/electron/release/*.AppImage
            packages/electron/release/*.deb
            packages/electron/release/*.zip

  # Gather every leg's artifacts, tag, and publish a single GitHub Release.
  release:
    name: Tag and publish release
    needs: [determine, build]
    if: needs.determine.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BODY_FILE="$RUNNER_TEMP/release-notes.md"
          node scripts/generate-release-notes.mjs \
            --version "${{ needs.determine.outputs.current_version }}" \
            --kind "${{ needs.determine.outputs.release_kind }}" \
            --repo "$GITHUB_REPOSITORY" \
            --output "$BODY_FILE"

          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.determine.outputs.tag_name }}"
          git push origin "${{ needs.determine.outputs.tag_name }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine.outputs.tag_name }}
          name: ${{ needs.determine.outputs.tag_name }}
          body_path: ${{ steps.notes.outputs.body_file }}
          prerelease: ${{ needs.determine.outputs.is_prerelease == 'true' }}
          files: artifacts/**/*

  # Publish the freshly released .vsix to the VS Code Marketplace. Called
  # explicitly so its result shows up in this run; a separate reusable workflow
  # so it can also be re-run on its own (workflow_dispatch) if the store publish
  # fails after the GitHub Release already exists.
  publish-marketplace:
    name: Publish to VS Code Marketplace
    needs: [determine, release]
    if: needs.determine.outputs.should_release == 'true'
    uses: ./.github/workflows/publish-marketplace.yml
    with:
      tag: ${{ needs.determine.outputs.tag_name }}
    secrets: inherit
