# Packaging config for the boardown desktop app.
#
# Everything the app runs is already bundled into dist/ (esbuild for the main
# process + preload, Vite for the renderer), so packaging only ships dist/ and
# package.json — no node_modules tree.
#
# Producing builds for all three OSes (each on its own runner) is automated by
# the repo's `Publish` workflow (.github/workflows/publish.yml), which attaches
# the installers to each GitHub Release alongside the .vsix.
# `pnpm --filter @boardown/electron dist` is the local entry point. Builds are
# currently unsigned: code-signing on Windows and Apple notarization on macOS
# need certificates/secrets and are deferred.
appId: com.boardown.app
productName: boardown
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
# Pin every artifact name to a `<product>-<version>-<platform/arch>.<ext>` shape.
# electron-builder's defaults treat x64 as the implicit arch and drop the suffix
# (so the Intel .dmg would be `boardown-<v>.dmg`, sorting away from the labelled
# arm64 one in the GitHub Releases list). Spelling out artifactName keeps every
# file self-describing and grouped.
mac:
  # Unsigned until an Apple Developer ID is set up; null skips the signing step
  # instead of letting electron-builder probe for an identity on CI.
  identity: null
  category: public.app-category.developer-tools
  # Build both architectures from the (arm64) CI runner — Electron ships
  # prebuilt binaries for each and the app has no native modules, so Intel
  # (x64) and Apple Silicon (arm64) installers come out of a single runner.
  # artifactName here governs the .zip; the dmg block below overrides the .dmg.
  artifactName: ${productName}-${version}-${arch}-mac.${ext}
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  # nsis = a Setup.exe wizard (Start-menu + desktop shortcuts, uninstaller),
  # mirroring the mac .dmg / linux .deb installers. The .zip stays as the
  # portable "just unzip and run boardown.exe" option.
  # artifactName here governs the .zip; the nsis block below overrides the .exe.
  artifactName: ${productName}-${version}-win.${ext}
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ${productName}-${version}-win-setup.${ext}
linux:
  category: Development
  # The npm package name is scoped (@boardown/electron); without these the .deb
  # would derive its package/file name from it (invalid: contains a slash) and
  # land in a release/@boardown/ subdir. Pin both to the product name instead.
  executableName: boardown
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - AppImage
    - deb
